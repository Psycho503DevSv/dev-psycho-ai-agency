# =============================================================================
#  Psycho503 Dev AI Agency — docker-compose.yml
#  Orquesta el agente y sus servicios auxiliares en contenedores aislados.
#  Uso: docker compose up --build
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  #  Agente principal
  # ---------------------------------------------------------------------------
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psycho503_agent
    restart: unless-stopped

    # Variables de entorno: se cargan desde el .env del host
    env_file:
      - .env
    environment:
      - AGENT_ENV=docker
      - WORKSPACE=/workspace

    # Montar el workspace del host como volumen en modo lectura+escritura.
    # El código fuente del agente (/app) es de solo-lectura dentro del contenedor.
    volumes:
      - ./projects:/workspace:rw
      - ./memory:/app/memory:rw
      - ./data:/app/data:rw
      - ./.env:/app/.env:ro

    # Exponer el dashboard de observabilidad al host
    ports:
      - "8050:8050"

    # Límites de recursos para prevenir abusos del sandbox
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

    # Red interna aislada
    networks:
      - agent_net

    # Healthcheck heredado del Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Logging con rotación para evitar discos llenos
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  #  Servicio de Grafana + Prometheus (métricas avanzadas, opcional)
  #  Descomenta este bloque si quieres métricas de servidor completas.
  # ---------------------------------------------------------------------------
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: psycho503_prometheus
  #   volumes:
  #     - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - agent_net

# ---------------------------------------------------------------------------
#  Red interna aislada (sin acceso a la red del host por defecto)
# ---------------------------------------------------------------------------
networks:
  agent_net:
    driver: bridge

# ---------------------------------------------------------------------------
#  Volúmenes nombrados para persistencia de memoria
# ---------------------------------------------------------------------------
volumes:
  agent_memory:
    driver: local
