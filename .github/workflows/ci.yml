name: 🧪 CI — Tests & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio faker

      - name: 🧪 Run test suite with coverage
        env:
          OPENAI_API_KEY: "mock-key-for-ci"
          NVIDIA_API_KEY: ""
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/runtime/ -v \
            --cov=runtime \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml

      - name: 🛡️ Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        continue-on-error: true
        with:
          files: coverage.xml
          flags: unittests
          name: psycho-ai-devos

  lint:
    name: 🔍 Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: 📦 Install linting tools
        run: |
          pip install bandit pyflakes

      - name: 🔐 Security audit with bandit
        run: |
          bandit -r runtime/ -ll -ii --skip B101,B603,B607 || true

      - name: 🧹 Check imports with pyflakes
        run: |
          python -m pyflakes runtime/ || true
